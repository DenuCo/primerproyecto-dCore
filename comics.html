        <main class="main-content">
            <section class="lanzamientos-section">
                <h2>Nuevos lanzamientos</h2>

                        <img src="https://placehold.co/200x280" width="200" height="280" alt="portada de una nueva obra">

            </section>
            <section class="contacto-section" id="contacto">
            <h2>Contacto</h2>
                <div class="contacto-form">
                    <form action="https://formspree.io/f/xnjrnjoy" method="post" enctype="">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Escriba aquí su nombre" required maxlength="20">
                        
                        <label for="correo">Email:</label>
                        <input type="email" id="correo" name="correo" placeholder="Escriba aquí su correo" required>
                        
                        <label for="asunto">Asunto:</label>
                        <input type="text" id="asunto" name="asunto" placeholder="Escriba aquí el asunto" required>
                        
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" placeholder="Escriba aquí su mensaje" required></textarea>
                        
                        <button type="submit" class="button-form">
                            Enviar mensaje
                        </button>
                    </form>
                </div>
            </section>
        </main>

        <footer class="footer">
